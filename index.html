<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeMatch Pro AI | المحرك المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #8b5cf6; --bg: #030005; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-text { text-shadow: 0 0 15px rgba(139, 92, 246, 0.6); }
        .stars { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #110524 0%, #030005 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: blink 3s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .section { display: none; animation: slideUp 0.6s ease forwards; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .btn-opt { transition: 0.3s; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); text-align: right; }
        .btn-opt:hover { background: rgba(139, 92, 246, 0.15); border-color: var(--p); transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="stars" id="star-field"></div>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter neon-text italic cursor-pointer" onclick="location.reload()">ANIMEMATCH <span class="text-violet-500">ULTRA</span></div>
        <div id="master-progress" class="hidden md:block text-[10px] text-violet-400 font-bold tracking-widest uppercase">جاري تحليل البيانات...</div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        
        <div id="home-screen" class="section active text-center">
            <h1 class="text-6xl md:text-8xl font-black mb-8 leading-tight">الرحلة <span class="text-violet-500">الكاملة</span></h1>
            <p class="text-gray-400 text-xl mb-12 max-w-2xl mx-auto">سنجري لك 5 اختبارات متتالية (شخصية، مزاج، عالم، وقت، اهتمام) لنعطيك أدق نتيجة ممكنة في تاريخ الأنمي.</p>
            <button onclick="startFullJourney()" class="bg-violet-600 px-12 py-5 rounded-3xl font-bold text-xl hover:scale-105 transition shadow-2xl shadow-violet-600/20">ابدأ الرحلة الشاملة</button>
        </div>

        <div id="quiz-screen" class="section max-w-2xl mx-auto">
            <div class="glass p-10 rounded-[3rem] border-violet-500/20 relative">
                <div class="flex justify-between mb-8 items-center">
                    <h2 id="quiz-category" class="text-violet-400 font-bold uppercase tracking-widest text-xs">الفئة</h2>
                    <div class="flex gap-1" id="step-dots"></div>
                </div>
                <h3 id="question-text" class="text-3xl font-bold mb-10 leading-tight">السؤال؟</h3>
                <div id="options-list" class="grid gap-4"></div>
            </div>
        </div>

        <div id="result-screen" class="section text-center">
            <div class="glass p-12 rounded-[4rem] border-violet-500/30">
                <div class="mb-8 p-6 bg-violet-600/10 rounded-3xl inline-block border border-violet-500/20">
                    <h4 class="text-violet-400 font-bold mb-2">تقرير الذكاء الاصطناعي المفصل:</h4>
                    <p id="analysis-text" class="text-lg">جاري استخراج البيانات...</p>
                </div>
                
                <h2 class="text-gray-400 mb-6 tracking-widest uppercase text-sm">أفضل 3 ترشيحات مطابقة لملفك الشخصي:</h2>
                
                <div id="suggestions-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12"></div>

                <div class="flex flex-wrap justify-center gap-4">
                    <button onclick="location.reload()" class="bg-violet-600 px-10 py-4 rounded-2xl font-bold hover:scale-105 transition">إعادة التجربة</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        // مصفوفة الأسئلة المتسلسلة (دمج الاختبارات)
        const fullJourney = [
            // 1. الشخصية
            { cat: "اختبار الشخصية", q: "كيف تقضي وقت فراغك عادة؟", options: [{t:"مغامرة وخروج", v:"Action"}, {t:"تأمل وهدوء", v:"Drama"}, {t:"تفكير وتحليل", v:"Mystery"}] },
            { cat: "اختبار الشخصية", q: "تتصرف بعقلك أم بقلبك؟", options: [{t:"العقل والمنطق", v:"Mystery"}, {t:"القلب والعاطفة", v:"Drama"}] },
            // 2. المزاج
            { cat: "المزاج الحالي", q: "كيف تشعر في هذه اللحظة؟", options: [{t:"فرحان ونشيط", v:"Comedy"}, {t:"حزين أو هادئ", v:"Drama"}, {t:"ملل وأريد إثارة", v:"Action"}] },
            // 3. العالم المفضل
            { cat: "العالم المفضل", q: "أي بيئة تفضل العيش فيها؟", options: [{t:"عالم سحري وخيالي", v:"Fantasy"}, {t:"مستقبل تكنولوجي", v:"Sci-Fi"}, {t:"عالم واقعي", v:"SliceOfLife"}, {t:"عالم مظلم وغامض", v:"Horror"}] },
            // 4. الاهتمامات
            { cat: "الاهتمام", q: "ما هو العنصر الأهم في القصة بالنسبة لك؟", options: [{t:"القتال والحماس", v:"Shonen"}, {t:"الألغاز والذكاء", v:"Psychological"}, {t:"الرومانسية", v:"Romance"}] },
            // 5. الوقت
            { cat: "الوقت", q: "كم ساعة تنوي قضاءها في المشاهدة؟", options: [{t:"ساعة واحدة (فيلم)", v:"Movie"}, {t:"عدة ساعات (أنمي قصير)", v:"Short"}, {t:"أريد سلسلة طويلة", v:"Long"}] }
        ];

        const finalResults = {
            Action: { a: "أنت شخص شجاع تحب التحدي والإثارة.", s: ["Attack on Titan", "Jujutsu Kaisen", "Vinland Saga"] },
            Drama: { a: "تملك روحاً حساسة وتقدر القصص الإنسانية العميقة.", s: ["Violet Evergarden", "A Silent Voice", "Your Lie in April"] },
            Mystery: { a: "عقلك تحليلي ولا يرضى بالحلول السطحية.", s: ["Death Note", "Monster", "Steins;Gate"] },
            Fantasy: { a: "أنت حالم وتبحث عن الهروب لعوالم مذهلة.", s: ["Hunter x Hunter", "Frieren", "Fullmetal Alchemist"] },
            Comedy: { a: "تبحث عن البهجة والضحك الصافي.", s: ["Gintama", "One Punch Man", "Spy x Family"] },
            Horror: { a: "تعشق الأدرينالين والغموض المظلم.", s: ["Berserk", "Another", "Tokyo Ghoul"] },
            SciFi: { a: "تفكيرك مستقبلي ومهتم بالخيال العلمي.", s: ["Psycho-Pass", "Cyberpunk", "Code Geass"] }
        };

        let currentStep = 0;
        let userProfile = []; // لتخزين كل الإجابات

        function startFullJourney() {
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            document.getElementById('master-progress').classList.remove('hidden');
            renderStep();
        }

        function renderStep() {
            const data = fullJourney[currentStep];
            document.getElementById('quiz-category').innerText = data.cat;
            document.getElementById('question-text').innerText = data.q;
            
            // تحديث النقاط (Dots)
            const dots = document.getElementById('step-dots');
            dots.innerHTML = '';
            fullJourney.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `w-2 h-2 rounded-full ${i <= currentStep ? 'bg-violet-500' : 'bg-white/10'}`;
                dots.appendChild(dot);
            });

            const list = document.getElementById('options-list');
            list.innerHTML = '';
            data.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = "btn-opt p-6 rounded-2xl font-bold";
                b.innerText = opt.t;
                b.onclick = () => {
                    userProfile.push(opt.v);
                    if(currentStep < fullJourney.length - 1) {
                        currentStep++;
                        renderStep();
                    } else {
                        processResults();
                    }
                };
                list.appendChild(b);
            });
        }

        function processResults() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');

            // منطق الحساب: نأخذ القيمة الأكثر تكراراً في إجابات المستخدم
            const frequency = {};
            userProfile.forEach(val => frequency[val] = (frequency[val] || 0) + 1);
            const topTag = Object.keys(frequency).reduce((a, b) => frequency[a] > frequency[b] ? a : b);

            const result = finalResults[topTag] || finalResults["Action"];
            
            // بناء نص التحليل بناءً على المسار
            const timePref = userProfile.includes("Movie") ? "يفضل الأفلام" : "يفضل السلاسل";
            document.getElementById('analysis-text').innerText = `${result.a} مع ملاحظة أنك ${timePref}.`;

            const grid = document.getElementById('suggestions-grid');
            grid.innerHTML = '';
            result.s.forEach(name => {
                grid.innerHTML += `
                    <div class="glass p-6 rounded-3xl border-violet-500/10 hover:border-violet-500 transition cursor-pointer">
                        <div class="w-full h-40 bg-violet-600/20 rounded-2xl mb-4 flex items-center justify-center text-4xl">🎬</div>
                        <h4 class="font-bold text-xl text-violet-400">${name}</h4>
                    </div>
                `;
            });
        }

        // نجوم الخلفية
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const s = Math.random() * 2 + 1;
            star.style.width = s + 'px'; star.style.height = s + 'px';
            star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('star-field').appendChild(star);
        }
    </script>
</body>
</html>
