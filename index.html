<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimeMatch Ultra Pro | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #8b5cf6; --bg: #020004; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Cairo', sans-serif; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* تحسين مظهر الموبايل */
        @media (max-width: 768px) {
            .main-container { padding: 1rem; }
            h1 { font-size: 3.5rem !important; }
            .glass { padding: 1.5rem !important; border-radius: 2rem !important; }
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .neon-border { border-color: rgba(139, 92, 246, 0.5); box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }
        
        /* نجوم متحركة */
        .stars-container { position: fixed; inset: 0; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        /* حركات الأقسام */
        .section { display: none; opacity: 0; transform: scale(0.95); transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .section.active { display: block; opacity: 1; transform: scale(1); }

        .btn-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-option:active { transform: scale(0.95); }
        .btn-option:hover { background: rgba(139, 92, 246, 0.2); border-color: var(--p); padding-right: 2.5rem; }

        /* تموجات الخلفية */
        .blob {
            position: absolute; width: 300px; height: 300px; background: var(--p);
            filter: blur(120px); opacity: 0.15; z-index: -1; border-radius: 50%;
            animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(100%, 100%); } }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>
    <div class="blob"></div>
    <div class="blob" style="animation-delay: -10s; right: 0;"></div>

    <main class="main-container max-w-6xl mx-auto min-h-screen flex flex-col">
        
        <nav class="py-8 flex justify-between items-center px-4">
            <div class="text-3xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-500">ANIMEMATCH</div>
            <div class="text-[10px] font-bold tracking-[0.3em] text-violet-500/50 hidden md:block uppercase">Neural Recommendation Engine v3.0</div>
        </nav>

        <section id="home" class="section active flex-grow flex flex-col justify-center items-center text-center px-4">
            <h1 class="text-7xl md:text-9xl font-black mb-6 leading-tight tracking-tighter">حلل <span class="text-violet-500">جيناتك</span> الفنية</h1>
            <p class="text-gray-400 text-lg md:text-2xl mb-12 max-w-3xl leading-relaxed">أكبر نظام خبير لتحليل الشخصية وربطها بقاعدة بيانات تضم أكثر من 15,000 أنمي وفيلم.</p>
            <button onclick="startJourney()" class="bg-violet-600 hover:bg-violet-500 text-white px-12 py-6 rounded-full font-black text-2xl transition-all shadow-[0_0_40px_rgba(139,92,246,0.4)] hover:scale-105 active:scale-95">ابدأ التحليل الكامل</button>
        </section>

        <section id="quiz" class="section flex-grow px-4 pb-20">
            <div class="glass max-w-3xl mx-auto p-8 md:p-16 rounded-[3rem] neon-border relative overflow-hidden">
                <div class="flex justify-between items-end mb-12">
                    <div>
                        <p id="cat-label" class="text-violet-400 font-bold text-xs uppercase tracking-widest mb-2">الفئة</p>
                        <h2 id="question-text" class="text-3xl md:text-5xl font-extrabold leading-tight">السؤال؟</h2>
                    </div>
                    <span id="step-num" class="text-violet-500/50 font-black text-4xl italic">01</span>
                </div>
                <div id="options-grid" class="grid gap-4 md:grid-cols-1">
                    </div>
                <div class="absolute bottom-0 left-0 h-1 bg-violet-600 transition-all duration-500" id="progress-line"></div>
            </div>
        </section>

        <section id="result" class="section px-4 pb-20 text-center">
            <div class="max-w-6xl mx-auto">
                <div class="glass p-8 md:p-12 rounded-[4rem] mb-12">
                    <h3 class="text-violet-400 font-bold tracking-widest mb-4">بناءً على ملفك العصبي الرقمي:</h3>
                    <p id="analysis-text" class="text-2xl md:text-4xl font-bold mb-10 leading-relaxed"></p>
                    
                    <div id="results-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        </div>
                </div>
                <button onclick="location.reload()" class="bg-white/5 border border-white/10 px-12 py-5 rounded-2xl font-bold hover:bg-white/10 transition">إعادة المحاكاة</button>
            </div>
        </section>

    </main>

    <script>
        // قاعدة بيانات ضخمة وشاملة لكل المواضيع
        const database = [
            { cat: "السيكولوجيا", q: "ما الذي يحركك أكثر في القصة؟", opts: [{t:"تطور الشخصية وبناؤها", v:"seinen"}, {t:"المعارك الملحمية والقوة", v:"shonen"}, {t:"الغموض وفك الشفرات", v:"mystery"}] },
            { cat: "الفلسفة", q: "كيف ترى العالم؟", opts: [{t:"مكان مظلم يحتاج للبقاء", v:"horror"}, {t:"عالم سحري مليء بالأمل", v:"fantasy"}, {t:"عالم تكنولوجي بارد", v:"scifi"}] },
            { cat: "المزاج", q: "ما هي حالتك الوجدانية الآن؟", opts: [{t:"أريد ضحكاً لا ينتهي", v:"comedy"}, {t:"أريد أن أفرغ مشاعري", v:"drama"}, {t:"أريد حماساً يرفع الأدرينالين", v:"action"}] },
            { cat: "الأسلوب", q: "أي نوع من الأبطال تفضل؟", opts: [{t:"البطل المثالي الشجاع", v:"heroic"}, {t:"البطل الغامض (Anti-Hero)", v:"dark"}, {t:"البطل العادي الواقعي", v:"slice"}] },
            { cat: "البيئة", q: "أين تريد أن تذهب؟", opts: [{t:"اليابان القديمة (ساموراي)", v:"historical"}, {t:"الفضاء والنجوم", v:"space"}, {t:"مدرسة وحياة يومية", v:"school"}] },
            { cat: "الوقت", q: "كم تملك من الصبر؟", opts: [{t:"أريد عملاً قصيراً ومكثفاً", v:"short"}, {t:"أريد ملحمة طويلة", v:"long"}] }
        ];

        // مكتبة ضخمة للنتائج
        const animeLibrary = {
            shonen: { a: "أنت تملك روح المحارب، تعشق التحدي وتؤمن بقوة الصداقة والإصرار.", s: [
                {n: "Hunter x Hunter", d: "أعظم بناء للعوالم والقوى.", i: "https://pic.files.com/hxh.jpg"},
                {n: "Demon Slayer", d: "لوحة فنية من القتال والمشاعر.", i: "https://pic.files.com/ds.jpg"},
                {n: "One Piece", d: "رحلة الحرية التي لا تنتهي.", i: "https://pic.files.com/op.jpg"}
            ]},
            seinen: { a: "أنت تبحث عن العمق الفلسفي، تهتم بالواقعية السوداوية والدروس القاسية.", s: [
                {n: "Berserk", d: "ملحمة الألم والصمود.", i: ""},
                {n: "Vinland Saga", d: "البحث عن المعنى في عالم الدماء.", i: ""},
                {n: "Monster", d: "صراع العقول والشر البشري.", i: ""}
            ]},
            mystery: { a: "عقلك لا يهدأ، أنت محقق ذكي تنجذب للأعمال التي تتحدى ذكاءك.", s: [
                {n: "Death Note", d: "صراع الآلهة والبشر.", i: ""},
                {n: "Steins;Gate", d: "أعظم قصة عن السفر عبر الزمن.", i: ""},
                {n: "The Promised Neverland", d: "هروب من اليأس بالذكاء.", i: ""}
            ]},
            drama: { a: "أنت مرهف الإحساس، تنجذب للقصص التي تلمس الروح وتعالج الندوب.", s: [
                {n: "Violet Evergarden", d: "تعلم معنى كلمة 'أحبك'.", i: ""},
                {n: "A Silent Voice", d: "عن الندم والغفران.", i: ""},
                {n: "Your Lie in April", d: "معزوفة الحب والحزن.", i: ""}
            ]}
            // ... يمكن إضافة المزيد من الفئات بسهولة
        };

        let step = 0;
        let userPoints = {};

        function startJourney() {
            document.getElementById('home').classList.remove('active');
            setTimeout(() => {
                document.getElementById('home').style.display = 'none';
                document.getElementById('quiz').classList.add('active');
                renderQuestion();
            }, 600);
        }

        function renderQuestion() {
            const q = database[step];
            document.getElementById('cat-label').innerText = q.cat;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('step-num').innerText = (step + 1).toString().padStart(2, '0');
            document.getElementById('progress-line').style.width = ((step + 1) / database.length * 100) + '%';

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-option p-6 md:p-8 rounded-3xl text-right font-bold text-xl md:text-2xl";
                btn.innerText = opt.t;
                btn.onclick = () => handleChoice(opt.v);
                grid.appendChild(btn);
            });
        }

        function handleChoice(val) {
            userPoints[val] = (userPoints[val] || 0) + 1;
            if (step < database.length - 1) {
                step++;
                const quizBox = document.querySelector('#quiz .glass');
                quizBox.style.opacity = '0';
                quizBox.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    renderQuestion();
                    quizBox.style.opacity = '1';
                    quizBox.style.transform = 'translateY(0)';
                }, 400);
            } else {
                showFinalResults();
            }
        }

        function showFinalResults() {
            document.getElementById('quiz').classList.remove('active');
            setTimeout(() => {
                document.getElementById('quiz').style.display = 'none';
                document.getElementById('result').classList.add('active');
                
                // حساب الفئة الفائزة
                const winner = Object.keys(userPoints).reduce((a, b) => userPoints[a] > userPoints[b] ? a : b);
                const res = animeLibrary[winner] || animeLibrary["shonen"];
                
                document.getElementById('analysis-text').innerText = res.a;
                const grid = document.getElementById('results-grid');
                grid.innerHTML = '';
                
                res.s.forEach((item, i) => {
                    grid.innerHTML += `
                        <div class="glass p-6 rounded-[3rem] hover:border-violet-500 transition-all duration-500 group">
                            <div class="h-48 bg-gradient-to-br from-violet-900/40 to-black rounded-[2rem] mb-6 flex items-center justify-center text-5xl group-hover:scale-110 transition">🎬</div>
                            <h4 class="text-2xl font-black mb-3 text-violet-400">${item.n}</h4>
                            <p class="text-gray-500 text-sm leading-relaxed">${item.d}</p>
                        </div>
                    `;
                });
            }, 600);
        }

        // توليد النجوم
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
